<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo de Acordes</title>
  <script src="https://unpkg.com/tone"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 { font-size: 24px; margin: 8px 0 16px; }

    .row { display:flex; gap:10px; }

    select, button {
      margin: 8px 0;
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #6c5ce7;
      color: white;
      font-weight: bold;
      font-size: 16px;
      width: 100%;
      transition: 0.2s;
    }

    select { background:#3b3b7a; }

    button:hover { transform: scale(1.03); }

    #opcoes button { width: 100%; }

    #resultado { font-size: 18px; margin-top: 10px; min-height: 22px; }

    #telaFinal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      display: none; align-items: center; justify-content: center; padding: 20px;
    }

    .final-card {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      padding: 25px; border-radius: 20px; width: 100%; max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 480px) {
      h1 { font-size: 20px; }
      .card { padding: 15px; }
      select, button { font-size: 15px; padding: 12px; }
    }
  </style>
</head>

<body>

<div class="card" id="jogo">
  <h1>🎵 Jogo de Acordes</h1>

  <div class="row">
    <select id="instrumento">
      <option value="piano">Piano</option>
      <option value="organ">Órgão</option>
      <option value="pad">Pad</option>
    </select>
  </div>

  <p id="fase"></p>
  <p id="score"></p>

  <button onclick="tocarSequencia()">▶ Ouvir acordes</button>
  <button onclick="repetir()">🔁 Ouvir novamente</button>

  <div id="opcoes"></div>
  <p id="resultado"></p>

  <button id="proxima" style="display:none" onclick="proximaFase()">➡ Próxima fase</button>
</div>

<div id="telaFinal">
  <div class="final-card">
    <h1>🏆 Parabéns!</h1>
    <p id="finalScore"></p>
    <p id="finalAcertos"></p>
    <p id="finalErros"></p>
    <button onclick="reiniciar()">🔄 Jogar novamente</button>
  </div>
</div>

<script>
let synth;
let timeouts = [];
let fase = 1;
let score = 0;
let acertos = 0;
let erros = 0;
let respostaCorreta = [];
let sequenciaAtual = [];
let respondido = false;
let tomAtual = "";
let acordesDoTom = [];

const campos = {
  C: ["C","Dm","Em","F","G","Am"],
  D: ["D","Em","F#m","G","A","Bm"],
  E: ["E","F#m","G#m","A","B","C#m"],
  F: ["F","Gm","Am","Bb","C","Dm"],
  G: ["G","Am","Bm","C","D","Em"],
  A: ["A","Bm","C#m","D","E","F#m"]
};

function criarInstrumento(tipo) {
  if (tipo === "piano") {
    synth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "sine" },
      envelope: { attack: 0.05, decay: 0.2, sustain: 0.3, release: 1 }
    }).toDestination();
  }

  if (tipo === "organ") {
    synth = new Tone.PolySynth(Tone.AMSynth).toDestination();
  }

  if (tipo === "pad") {
    synth = new Tone.PolySynth(Tone.FMSynth).toDestination();
  }
}

function limparAudio() {
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
  if (synth) synth.releaseAll();
}

function gerarAcorde(acorde) {
  const mapa = {
    "C": ["C4","E4","G4"],
    "Dm": ["D4","F4","A4"],
    "Em": ["E4","G4","B4"],
    "F": ["F4","A4","C5"],
    "G": ["G4","B4","D5"],
    "Am": ["A4","C5","E5"],
    "D": ["D4","F#4","A4"],
    "F#m": ["F#4","A4","C#5"],
    "A": ["A4","C#5","E5"],
    "Bm": ["B4","D5","F#5"],
    "E": ["E4","G#4","B4"],
    "G#m": ["G#4","B4","D#5"],
    "C#m": ["C#4","E4","G#4"],
    "Bb": ["Bb3","D4","F4"],
    "Gm": ["G3","Bb3","D4"]
  };
  return mapa[acorde];
}

function atualizarUI() {
  document.getElementById("fase").innerText = `Fase: ${fase} / 5`;
  document.getElementById("score").innerText = `Pontuação: ${score}`;
}

window.tocarSequencia = function() {
  Tone.start();
  limparAudio();

  const tipo = document.getElementById("instrumento").value;
  criarInstrumento(tipo);

  respondido = false;
  document.getElementById("resultado").innerText = "";
  document.getElementById("proxima").style.display = "none";

  const tons = Object.keys(campos);
  tomAtual = tons[Math.floor(Math.random() * tons.length)];
  acordesDoTom = campos[tomAtual];

  respostaCorreta = [];
  sequenciaAtual = [];

  for (let i = 0; i < 4; i++) {
    const acorde = acordesDoTom[Math.floor(Math.random() * acordesDoTom.length)];
    respostaCorreta.push(acorde);
    sequenciaAtual.push(acorde);

    const t = setTimeout(() => {
      synth.triggerAttackRelease(gerarAcorde(acorde), "2n");
    }, i * 1500);

    timeouts.push(t);
  }

  gerarOpcoes();
}

window.repetir = function() {
  limparAudio();

  sequenciaAtual.forEach((acorde, i) => {
    const t = setTimeout(() => {
      synth.triggerAttackRelease(gerarAcorde(acorde), "2n");
    }, i * 1500);

    timeouts.push(t);
  });
}

function gerarOpcaoErrada() {
  let opcao = [];

  for (let i = 0; i < 4; i++) {
    opcao.push(acordesDoTom[Math.floor(Math.random() * acordesDoTom.length)]);
  }

  return opcao.join(" - ");
}

function gerarOpcoes() {
  const div = document.getElementById("opcoes");
  div.innerHTML = "";

  const opcoes = [
    respostaCorreta.join(" - "),
    gerarOpcaoErrada(),
    gerarOpcaoErrada(),
    gerarOpcaoErrada()
  ];

  opcoes.sort(() => Math.random() - 0.5);

  opcoes.forEach(op => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => verificar(op);
    div.appendChild(btn);
  });
}

function verificar(resposta) {
  if (respondido) return;
  respondido = true;

  const correta = respostaCorreta.join(" - ");

  if (resposta === correta) {
    document.getElementById("resultado").innerText = "✅ Acertou!";
    score += 10;
    acertos++;
  } else {
    document.getElementById("resultado").innerText = `❌ Errou!
Resposta correta: ${correta}`;
    erros++;
  }

  document.getElementById("proxima").style.display = "inline-block";
  atualizarUI();
}

window.proximaFase = function() {
  limparAudio();
  fase++;

  if (fase > 5) {
    mostrarTelaFinal();
    return;
  }

  tocarSequencia();
  atualizarUI();
}

function mostrarTelaFinal() {
  document.getElementById("jogo").style.display = "none";
  document.getElementById("telaFinal").style.display = "flex";

  document.getElementById("finalScore").innerText = "Pontuação: " + score;
  document.getElementById("finalAcertos").innerText = "Acertos: " + acertos;
  document.getElementById("finalErros").innerText = "Erros: " + erros;
}

function reiniciar() {
  limparAudio();

  fase = 1;
  score = 0;
  acertos = 0;
  erros = 0;

  document.getElementById("telaFinal").style.display = "none";
  document.getElementById("jogo").style.display = "block";

  atualizarUI();
  tocarSequencia();
}

atualizarUI();
</script>

</body>
</html>
