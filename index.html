<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo Musical</title>
  <script src="https://unpkg.com/tone"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: white;
      text-align: center;
      padding: 20px;
    }

    #timerBox {
      background: #ff7675;
      padding: 10px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: bold;
      width: fit-content;
      margin: 10px auto;
      box-shadow: 0 0 10px rgba(255, 118, 117, 0.7);
    }

    .card {
      max-width: 520px;
      margin: auto;
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 16px;
    }

    button,
    select {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 12px;
      background: #6c5ce7;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    #timer {
      margin: 10px 0;
      font-size: 18px;
    }

    #telaFinal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
    }

    #perguntaBox {
      background: rgba(255, 255, 255, 0.08);
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
      font-size: 18px;
      line-height: 1.6;
    }

    .label {
      opacity: 0.7;
      font-size: 14px;
    }

    .valor {
      font-weight: bold;
      font-size: 22px;
      color: #a29bfe;
    }

    #timerBox {
      display: none;
    }
  </style>
</head>

<body>

  <div class="card" id="jogo">

    <h1>🎵 Jogo Musical</h1>

    <!-- MENU -->
    <div id="menuInicial">
      <select id="modo">
        <option value="acorde">Modo Acordes</option>
        <option value="grau">Modo Graus</option>
      </select>

      <select id="instrumento">
        <option value="piano">Piano</option>
        <option value="organ">Órgão</option>
        <option value="pad">Pad</option>
      </select>

      <button onclick="iniciar()">▶ Começar</button>
    </div>

    <div id="areaJogo" style="display:none;">
      <!-- JOGO -->
      <p id="fase"></p>
      <p id="score"></p>
      <div id="timerBox">
        ⏱ <span id="timer">3</span>
      </div>

      <button id="btnRepetir" onclick="repetir()">🔁 Repetir</button>

      <div id="perguntaBox"></div>
      <div id="opcoes"></div>
      <p id="resultado"></p>

      <button id="proxima" style="display:none" onclick="proximaFase()">➡ Próxima</button>
    </div>
  </div>

  <!-- TELA FINAL -->
  <div id="telaFinal">
    <div class="card">
      <h1>🏆 Resultado</h1>
      <p id="finalScore"></p>
      <button onclick="reiniciar()">🔄 Jogar novamente</button>
    </div>
  </div>

  <script>
    let synth;
    let timeouts = [];
    let fase = 1, score = 0, acertos = 0, erros = 0;
    let respostaCorreta = [];
    let sequenciaAtual = [];
    let timerInterval;

    const graus = ["I", "II", "III", "IV", "V", "VI", "VII"];

    const camposAcordes = {
      C: ["C", "Dm", "Em", "F", "G", "Am"],
      D: ["D", "Em", "F#m", "G", "A", "Bm"],
      G: ["G", "Am", "Bm", "C", "D", "Em"],
      A: ["A", "Bm", "C#m", "D", "E", "F#m"]
    };

    const camposNotas = {
      C: ["C", "D", "E", "F", "G", "A", "B"],
      D: ["D", "E", "F#", "G", "A", "B", "C#"],
      G: ["G", "A", "B", "C", "D", "E", "F#"],
      A: ["A", "B", "C#", "D", "E", "F#", "G#"]
    };

    function criarInstrumento(tipo) {
      if (tipo === "piano") synth = new Tone.PolySynth(Tone.Synth).toDestination();
      if (tipo === "organ") synth = new Tone.PolySynth(Tone.AMSynth).toDestination();
      if (tipo === "pad") synth = new Tone.PolySynth(Tone.FMSynth).toDestination();
    }

    function limparAudio() {
      timeouts.forEach(t => clearTimeout(t));
      timeouts = [];
      if (synth) synth.releaseAll();
    }

    function gerarAcorde(ac) {
      const map = {
        "C": ["C4", "E4", "G4"], "Dm": ["D4", "F4", "A4"], "Em": ["E4", "G4", "B4"],
        "F": ["F4", "A4", "C5"], "G": ["G4", "B4", "D5"], "Am": ["A4", "C5", "E5"],
        "D": ["D4", "F#4", "A4"], "F#m": ["F#4", "A4", "C#5"], "A": ["A4", "C#5", "E5"],
        "Bm": ["B4", "D5", "F#5"], "C#m": ["C#4", "E4", "G#4"], "E": ["E4", "G#4", "B4"]
      };
      return map[ac];
    }

    function iniciar() {
      const tipo = document.getElementById("instrumento").value;
      criarInstrumento(tipo);

      document.getElementById("menuInicial").style.display = "none";
      document.getElementById("areaJogo").style.display = "block";

      proximaPergunta();
    }

    function tocarSequencia(acordes) {
      limparAudio();
      sequenciaAtual = acordes;

      acordes.forEach((ac, i) => {
        const t = setTimeout(() => {
          synth.triggerAttackRelease(gerarAcorde(ac), "2n");
        }, i * 1200);
        timeouts.push(t);
      });
    }

    function repetir() {
      if (sequenciaAtual.length > 0) tocarSequencia(sequenciaAtual);
    }

    function iniciarTimer() {
      let t = 5;
      document.getElementById("timer").innerText = t;

      clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        t--;
        document.getElementById("timer").innerText = t;

        // 🔥 efeito visual quando está acabando
        if (t === 1) {
          document.getElementById("timerBox").style.background = "#d63031";
        }

        if (t <= 0) {
          clearInterval(timerInterval);
          verificar(null);
        }
      }, 1000);
    }

    function proximaPergunta() {
      document.getElementById("resultado").innerText = "";
      document.getElementById("proxima").style.display = "none";

      const modo = document.getElementById("modo").value;

      if (modo === "grau") {
        document.getElementById("timerBox").style.display = "block";
      } else {
        document.getElementById("timerBox").style.display = "none";
      }

      if (modo === "acorde") {
        clearInterval(timerInterval);
        document.getElementById("timer").innerText = "";
        document.getElementById("btnRepetir").style.display = "block";
        const tons = Object.keys(camposAcordes);
        const tom = tons[Math.floor(Math.random() * tons.length)];
        const acordes = camposAcordes[tom];

        respostaCorreta = [];
        for (let i = 0; i < 4; i++) {
          respostaCorreta.push(acordes[Math.floor(Math.random() * acordes.length)]);
        }

        tocarSequencia(respostaCorreta);
        gerarOpcoesAcordes(acordes);

        document.getElementById("pergunta").innerText = "Ouça os acordes";
        document.getElementById("timer").innerText = "";
      }
      else {
        document.getElementById("btnRepetir").style.display = "none";
        const tons = Object.keys(camposNotas);
        const tom = tons[Math.floor(Math.random() * tons.length)];
        const notas = camposNotas[tom];

        const idx = Math.floor(Math.random() * 7);
        const nota = notas[idx];
        const grau = graus[idx];

        if (Math.random() > 0.5) {
          document.getElementById("perguntaBox").innerHTML = `
            <div><span class="label">Tom</span><br><span class="valor">${tom}</span></div>
            <div><span class="label">Nota</span><br><span class="valor">${nota}</span></div>
          `;
          respostaCorreta = grau;
          gerarOpcoesGraus();
        } else {
          document.getElementById("perguntaBox").innerHTML = `
            <div><span class="label">Tom</span><br><span class="valor">${tom}</span></div>
            <div><span class="label">Grau</span><br><span class="valor">${grau}</span></div>
          `;
          respostaCorreta = nota;
          gerarOpcoesNotas(notas);
        }

        iniciarTimer();
      }
    }

    function gerarOpcoesAcordes(acordes) {
      const div = document.getElementById("opcoes");
      div.innerHTML = "";

      const correta = respostaCorreta.join(" - ");
      let op = [correta];

      while (op.length < 4) {
        let temp = [];
        for (let i = 0; i < 4; i++) {
          temp.push(acordes[Math.floor(Math.random() * acordes.length)]);
        }
        let txt = temp.join(" - ");
        if (!op.includes(txt)) op.push(txt);
      }

      op.sort(() => Math.random() - 0.5);

      op.forEach(o => {
        let b = document.createElement("button");
        b.innerText = o;
        b.onclick = () => verificar(o);
        div.appendChild(b);
      });
    }

    function gerarOpcoesGraus() {
      const div = document.getElementById("opcoes");
      div.innerHTML = "";
      let op = [respostaCorreta];

      while (op.length < 4) {
        let g = graus[Math.floor(Math.random() * 7)];
        if (!op.includes(g)) op.push(g);
      }

      op.sort(() => Math.random() - 0.5);

      op.forEach(o => {
        let b = document.createElement("button");
        b.innerText = o;
        b.onclick = () => verificar(o);
        div.appendChild(b);
      });
    }

    function gerarOpcoesNotas(notas) {
      const div = document.getElementById("opcoes");
      div.innerHTML = "";
      let op = [respostaCorreta];

      while (op.length < 4) {
        let n = notas[Math.floor(Math.random() * notas.length)];
        if (!op.includes(n)) op.push(n);
      }

      op.sort(() => Math.random() - 0.5);

      op.forEach(o => {
        let b = document.createElement("button");
        b.innerText = o;
        b.onclick = () => verificar(o);
        div.appendChild(b);
      });
    }

    function verificar(resp) {
      clearInterval(timerInterval);

      let correta = Array.isArray(respostaCorreta)
        ? respostaCorreta.join(" - ")
        : respostaCorreta;

      if (resp === correta) {
        document.getElementById("resultado").innerText = "✅ Acertou";
        score += 10; acertos++;
      } else {
        document.getElementById("resultado").innerText = `❌ Errou | Correto: ${correta}`;
        erros++;
      }

      document.getElementById("proxima").style.display = "block";
      atualizarUI();
    }

    function proximaFase() {
      fase++;

      if (fase > 5) {
        mostrarTelaFinal();
        return;
      }

      proximaPergunta();
      atualizarUI();
    }

    function mostrarTelaFinal() {
      document.getElementById("jogo").style.display = "none";
      document.getElementById("telaFinal").style.display = "flex";

      document.getElementById("finalScore").innerText =
        `Score: ${score} | Acertos: ${acertos} | Erros: ${erros}`;
    }

    function reiniciar() {
      fase = 1;
      score = 0;
      acertos = 0;
      erros = 0;

      limparAudio();
      clearInterval(timerInterval);

      document.getElementById("telaFinal").style.display = "none";
      document.getElementById("jogo").style.display = "block";

      // voltar telas
      document.getElementById("menuInicial").style.display = "block";
      document.getElementById("areaJogo").style.display = "none";

      // limpar UI
      document.getElementById("pergunta").innerText = "";
      document.getElementById("opcoes").innerHTML = "";
      document.getElementById("resultado").innerText = "";
      document.getElementById("timer").innerText = "";
      document.getElementById("proxima").style.display = "none";

      atualizarUI();
    }

    function atualizarUI() {
      document.getElementById("fase").innerText = "Fase: " + fase;
      document.getElementById("score").innerText = "Score: " + score;
    }

    atualizarUI();
  </script>

</body>

</html>
